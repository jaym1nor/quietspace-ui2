<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #262a33;
    --text: #e8eaed;
    --muted: #8a8f98;
    --accent: #4f8cff;
    --accent-hover: #3d78e8;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  .card h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    text-align: center;
  }

  .card p.subtitle {
    margin: 0 0 28px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field {
    margin-bottom: 18px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 11px 12px;
    background: #0f1115;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button:hover {
    background: var(--accent-hover);
  }

  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .error {
    display: none;
    background: rgba(255, 82, 82, 0.1);
    border: 1px solid rgba(255, 82, 82, 0.3);
    color: #ff8080;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 18px;
  }

  .error.show {
    display: block;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Enter your credentials to continue</p>

    <div class="error" id="error">Please enter both a username and password.</div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="Enter your username">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password">
      </div>

      <button type="submit">Log in</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        errorBox.classList.add('show');
        return;
      }

      errorBox.classList.remove('show');
      // Hook up your actual authentication logic here.
      alert('Login submitted for: ' + username);
    });
  </script>

</body>
</html>
