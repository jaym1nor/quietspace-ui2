<!DOCTYPE html> <!--SIMPLE DASHBOARD MOCK UP BY GOOGLE GEMINI. WILL BE REPLACED WITH A PROPER DASHBOARD LATER, USED BY MAKELL FOR TESTING.-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuietSpace - Staff Dashboard (Mock)</title>
  <script src="static\socket.io.min.js"></script>
  <style>
    body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; }
    h1 { color: #1f3b73; }
    .container { display: flex; gap: 20px; margin-top: 20px; }
    .panel { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h2 { border-bottom: 2px solid #edf2f7; padding-bottom: 10px; margin-top: 0; }
    ul { list-style-type: none; padding: 0; }
    li { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.95rem; display: flex; justify-content: space-between; }
    .alert-tag { background: #ff6b6b; color: white; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    .report-tag { background: #ffd966; color: #111; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
    .timestamp { color: #888; font-size: 0.8rem; }
  </style>
</head>
<body>

  <h1>QuietSpace Staff Dashboard 🛡️</h1>
  <p>Monitoring real-time noise events and anonymous student reports.</p>

  <div class="container">
    <div class="panel">
      <h2>Automated Room Alerts (Mics)</h2>
      <ul id="micAlertsList">
        <li><i>Waiting for hardware/mic thresholds...</i></li>
      </ul>
    </div>

    <div class="panel">
      <h2>Student Submitted Reports</h2>
      <ul id="studentReportsList">
        <li><i>Waiting for student submissions...</i></li>
      </ul>
    </div>
  </div>

  <div class="panel">
  <h2>Room Threshold Controls ⚙️</h2>
  <label>Target Room:</label>
  <input type="text" id="targetRoom" value="311" style="width: 50px;"><br><br>
  
  <label>Green Max Level (Default 20):</label>
  <input type="number" id="greenMax" value="20"><br><br>
  
  <label>Yellow Max Level (Default 50):</label>
  <input type="number" id="yellowMax" value="50"><br><br>
  
  <button onclick="sendNewThresholds()">Apply New Thresholds</button>
</div>

  <script>
    // Connect to the Python WebSocket server
    const socket = io();

    const micAlertsList = document.getElementById('micAlertsList');
    const studentReportsList = document.getElementById('studentReportsList');

    // Clear placeholder text on first connection
    socket.on('connect', () => {
      console.log("Dashboard connected to server successfully!");
    });

    // 1. Listen for Microphone Noise Alerts
    socket.on('noise_update', (data) => {
      // Create a new list item entry
      const li = document.createElement('li');
      li.innerHTML = `
        <span>⚠️ <b>Room ${data.room}</b> is <span class="alert-tag">${data.status}</span></span>
        <span class="timestamp">${new Date(data.timestamp).toLocaleTimeString()}</span>
      `;
      
      // Remove placeholder text if it's there
      if(micAlertsList.innerHTML.includes('Waiting for')) micAlertsList.innerHTML = '';
      micAlertsList.prepend(li); // Put latest updates at the top
    });

    // 2. Listen for Anonymous Student Form Reports
    socket.on('dashboard_new_report', (data) => {
      const li = document.createElement('li');
      li.innerHTML = `
        <div>
          <b>Room ${data.room}</b> - <span class="report-tag">${data.noiseType}</span>
          <br><small style="color:#555">${data.details || 'No details provided.'}</small>
        </div>
        <span class="timestamp">${new Date(data.timestamp).toLocaleTimeString()}</span>
      `;

      if(studentReportsList.innerHTML.includes('Waiting for')) studentReportsList.innerHTML = '';
      studentReportsList.prepend(li);
    });
    
    function sendNewThresholds() { // Function that will send new threshold values from staff dashboard to the room noise level page.
        const thresholdData = { // Get correct room, green thresold and yellow threshold.
        room: document.getElementById('targetRoom').value,
        greenMax: parseInt(document.getElementById('greenMax').value),
        yellowMax: parseInt(document.getElementById('yellowMax').value)
        };
        
        // Emit the event to the Python server
        socket.emit('change_settings', thresholdData);
        alert(`Settings sent for Room ${thresholdData.room}!`);
    }
  </script>
</body>
</html>
