Updated by Makell Williams with some slight help from Google Gemini to get use to SocketIO.-->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuietSpace - Submit a Noise Report</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #c5e6f9;
      color: #1f2a44;
      min-height: 100vh;
      margin: 0;
    }

    .page {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 3rem;
    }

    .header {
      width: 100%;
      height: 340px;
      overflow: hidden;
      background-color: #dcecf7;
      padding: 0;
    }

    .logo-wrap {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 70%;
      display: block;
    }

    .form-card {
      width: min(760px, 92%);
      background: linear-gradient(to bottom,
          #ffffff 0%,
          #f7fbff 45%,
          #edf5fc 100%);
      padding: 2.25rem 1.875rem;
      border-radius: 14px;
      box-shadow:
        0 24px 55px rgba(56, 104, 180, 0.20),
        0 10px 24px rgba(31, 60, 115, 0.10);
      margin-top: -0.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(214, 228, 242, 0.95);
      position: relative;
      z-index: 2;
    }


    .title {
      font-size: clamp(1.9rem, 4vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
      color: #1f3b73;
      line-height: 1.1;
    }

    .subtitle {
      text-align: center;
      font-size: 1rem;
      margin-bottom: 30px;
      color: #4c5d7a;
      line-height: 1.6;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
    }

    form {
      display: grid;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 1rem;
      color: #1f2a44;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #cfdceb;
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      background-color: #f9fcff;
      color: #1f2a44;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    input[readonly] {
      background-color: #eef5fb;
      color: #355070;
      font-weight: 600;
      cursor: not-allowed;
    }

    select:focus,
    textarea:focus,
    input[type="text"]:focus {
      border-color: #5a8dee;
      box-shadow: 0 0 0 3px rgba(90, 141, 238, 0.15);
      background-color: white;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .helper-text {
      font-size: 0.92rem;
      color: #60708a;
      margin-top: -8px;
      line-height: 1.4;
    }

    .submit-btn {
      background: linear-gradient(to right, #1f77d0, #1768bf);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 15px 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 8px 18px rgba(31, 119, 208, 0.25);
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(31, 119, 208, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .success-message {
      display: none;
      margin-top: 22px;
      text-align: center;
      font-size: 1rem;
      color: #1b5e20;
      background-color: #e8f5e9;
      padding: 16px;
      border-radius: 14px;
      line-height: 1.5;
      border: 1px solid #cde9cf;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 700px) {
      .header {
        height: 180px;
        padding-top: 0;
      }

      .logo-wrap {
        width: 100%;
        height: 100%;
      }

      .logo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 70%;
      }

      .form-card {
        width: 94%;
        padding: 24px 18px;
        margin-top: -20px;
        border-radius: 20px;
      }

      .subtitle {
        font-size: 0.97rem;
        margin-bottom: 24px;
      }
    }
  </style>
  <script src="/static/socket.io.min.js"></script> <!--Get the socketIO library.-->
</head>

<body>
  <div class="page">
    <div class="header">
      <div class="logo-wrap">
        <img src="logo.png" alt="QuietSpace logo" />
      </div>
    </div>

    <div class="form-card">
      <div class="title">Submit a Noise Report</div>
      <div class="subtitle">
        Help us maintain a quieter study environment by reporting disruptive noise in your area.
      </div>

      <form id="noiseReportForm">
        <div class="form-group">
          <label for="roomDisplay">Study Room</label>
          <input type="text" id="roomDisplay" readonly />
        </div>

        <div class="form-group">
          <label for="roomSelect">Which room is noisy?</label>
          <select id="roomSelect" name="room" required>
            <option value="">Loading nearby rooms...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="noiseType">Type of Noise</label>
          <select id="noiseType" name="noiseType" required>
            <option value="">Select a noise type</option>
            <option value="loud_talking">Loud talking</option>
            <option value="group_conversation">Group conversation</option>
            <option value="music_audio">Music or audio</option>
            <option value="repeated_disruptions">Repeated disruptions</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="severity">Noise Level</label>
          <select id="severity" name="severity">
            <option value="">Select level</option>
            <option value="low">Low (slightly distracting)</option>
            <option value="medium">Medium (hard to focus)</option>
            <option value="high">High (very disruptive)</option>
          </select>
        </div>

        <div class="form-group hidden" id="otherNoiseGroup">
          <label for="otherNoiseDetails">Please specify</label>
          <input type="text" id="otherNoiseDetails" name="otherNoiseDetails"
            placeholder="Please explain the type of noise..." />
        </div>

        <div class="form-group">
          <label for="details">Additional Details (Optional)</label>
          <textarea id="details" name="details" placeholder="Briefly describe the issue..."></textarea>
        </div>

        <div class="helper-text">
          Reports are tied to the selected study room to help staff quickly identify where the issue is occurring.
        </div>

        <button type="submit" class="submit-btn">Submit Report</button>
      </form>

      <div class="success-message" id="successMessage">
        Your report has been submitted. Thank you for helping keep QuietSpace quiet.
      </div>
    </div>
  </div>

  <script>
    const socket = io(); // Connect to the Python Flask-SocketIO server. Address can be put in parentheses for stuff if needed.

    function getRoomFromURL() {
      const params = new URLSearchParams(window.location.search);
      const room = params.get("room");
      if (room) { // Updated so if URL has room part of query equal to something, the text matches the room number.
        return room.trim();
      }

      return "General";
    }

    const room = getRoomFromURL();
    const roomDisplay = document.getElementById("roomDisplay");
    const noiseType = document.getElementById("noiseType");
    const otherNoiseGroup = document.getElementById("otherNoiseGroup");
    const otherNoiseDetails = document.getElementById("otherNoiseDetails");
    const form = document.getElementById("noiseReportForm");
    const successMessage = document.getElementById("successMessage");
    const roomSelect = document.getElementById("roomSelect");

    roomDisplay.value = `Study Room ${room}`;
    
    // Load nearby rooms
    fetch(`/api/rooms`)
        .then(res => res.json())
        .then(data => {
            if (data.success && data.rooms) {
                const currentRoom = data.rooms.find(r => r.name === `Study Room ${room}`);
                
                let roomOptions = [`Study Room ${room}`];
                
                if (currentRoom && currentRoom.nearby_rooms) {
                    currentRoom.nearby_rooms.forEach(r => {
                        if (!roomOptions.includes(r)) {
                            roomOptions.push(r);
                        }
                    });
                }
                
                roomSelect.innerHTML = '';
                
                roomOptions.forEach(roomName => {
                    const option = document.createElement('option');
                    option.value = roomName;
                    option.textContent = roomName;
                    roomSelect.appendChild(option);
                });
            } else {
                roomSelect.innerHTML = `<option value="">No rooms available</option>`;
            }
        })
        .catch(err => {
            console.error('Error loading rooms:', err);
            roomSelect.innerHTML = `<option value="">Error loading rooms</option>`;
        });

    noiseType.addEventListener("change", function () {
      if (noiseType.value === "other") {
        otherNoiseGroup.classList.remove("hidden");
        otherNoiseDetails.required = true;
      } else {
        otherNoiseGroup.classList.add("hidden");
        otherNoiseDetails.required = false;
        otherNoiseDetails.value = "";
      }
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const details = document.getElementById("details").value;
      const otherDetails = otherNoiseDetails.value;
      const fullText = details + ' ' + otherDetails;

      // --- Profanity check ---
      try {
        const res = await fetch('https://vector.profanity.dev', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: fullText })
        });

        const data = await res.json();
        
        if (data.isProfanity) {
            alert('Your report contains inappropriate language. Please revise.');
            return;
        }
      } catch (error) {
        console.error('Profanity check failed:', error);
        alert('Unable to verify language. Please try again.');
        return;
      }
      // --- End profanity check ---

      const formData = {
          room: roomSelect.value,
          reporter_room: room,
          noiseType: noiseType.value,
          severity: document.getElementById("severity").value,
          otherNoiseDetails: otherDetails,
          details: details
      };

      socket.emit('submit_report', formData); // Send the report data to the Python server in real time!
      console.log("Noise report submitted:", formData);

      successMessage.style.display = "none";
      form.reset();
      roomDisplay.value = `Study Room ${room}`;
      otherNoiseGroup.classList.add("hidden");
      otherNoiseDetails.required = false;
      successMessage.style.display = "block";
    });
  </script>
</body>

</html>
