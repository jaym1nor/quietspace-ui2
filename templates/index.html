<!--Not sure who originally made this page.
Updated by Makell Williams with some slight help from Google Gemini.
Made it work more as a template for many different rooms and to be able to apply setting changes from dashboard..-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuietSpace - Room Noise Display</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: "Avenir Next", "Segoe UI", "Inter", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: background-color 0.4s ease, color 0.4s ease;
      padding: 24px;
      background-color: #7ed957;
      color: #111;
    }

    .screen {
      width: 100%;
      min-height: calc(100vh - 48px);
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .top-bar {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-top: 8px;
    }

    .room-label {
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.9;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(6px);
    }

    .main-panel {
      width: min(900px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: clamp(24px, 4vw, 42px);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.16);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(8px);
    }

    .status {
      font-size: clamp(4rem, 11vw, 8rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .thank-you {
      font-size: clamp(1.2rem, 2.8vw, 2rem);
      font-weight: 600;
      max-width: 760px;
      line-height: 1.35;
    }

    .level {
      display: none;
    }

    .message {
      font-size: clamp(1rem, 2vw, 1.25rem);
      max-width: 680px;
      opacity: 0.9;
      line-height: 1.5;
    }

    .bottom-row {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 8px;
      margin-top: 24px;
    }

    .report-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 20px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.18);
      box-shadow:
        0 14px 32px rgba(0, 0, 0, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
    }

    .report-text-wrap {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 260px;
    }

    .report-title {
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .report-subtext {
      font-size: 0.95rem;
      line-height: 1.4;
      opacity: 0.9;
    }

    .qr-image {
      width: clamp(92px, 11vw, 130px);
      height: clamp(92px, 11vw, 130px);
      object-fit: contain;
      background: white;
      border: 3px solid rgba(0, 0, 0, 0.15);
      border-radius: 16px;
      padding: 8px;
      flex-shrink: 0;
    }

    button {
      margin-top: 18px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background-color: rgba(255, 255, 255, 0.95);
      color: #1565c0;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover {
      opacity: 0.96;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .hidden {
      display: none !important;
    }

    .countdown-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 18px 24px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.18);
      box-shadow:
        0 14px 32px rgba(0, 0, 0, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
    }

    .countdown-title {
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .countdown-circle-wrap {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .countdown-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.35);
      stroke-width: 8;
    }

    .countdown-progress {
      fill: none;
      stroke: #111;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 326.73;
      stroke-dashoffset: 0;
      transform: rotate(-90deg);
      transform-origin: center;
    }

    .countdown-time {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .countdown-subtext {
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.4;
      max-width: 300px;
    }

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      .screen {
        min-height: calc(100vh - 32px);
      }

      .main-panel {
        border-radius: 22px;
        gap: 14px;
      }

      .bottom-row {
        margin-top: 18px;
      }

      .report-card,
      .countdown-card {
        width: 100%;
        max-width: 420px;
      }

      .report-card {
        flex-direction: column;
        text-align: center;
        gap: 14px;
      }

      .report-text-wrap {
        text-align: center;
        max-width: none;
      }

      button {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
  <script src="/static/socket.io.min.js"></script>
</head>
<body>
  <div class="screen">
    <div class="top-bar">
      <div class="room-label" id="roomLabel">Study Room 311</div>
    </div>

    <div class="main-panel">
      <div class="status" id="statusText">QUIET</div>

      <div class="thank-you" id="thankYouText">
        Thank you for keeping this space quiet!
      </div>

      <div class="level" id="soundLevel">Current Sound Level: 0</div>

      <div class="message" id="messageText">Noise level is acceptable.</div>

      <button id="startButton" onclick="startMonitoring()">Start Microphone</button>
    </div>

    <div class="bottom-row">
      <div class="report-card" id="reportCard">
        <div class="report-text-wrap">
          <div class="report-title">Need to report noise?</div>
          <div class="report-subtext">
            Scan the QR code to submit a room-specific noise report.
          </div>
        </div>
        <img
          src="{{ url_for('static', filename='testqrcode.png') }}"
          alt="QR code"
          class="qr-image"
        />
      </div>

      <div class="countdown-card hidden" id="countdownCard">
        <div class="countdown-title">Quiet Down to Reset:</div>

        <div class="countdown-circle-wrap">
          <svg width="180" height="180" viewBox="0 0 120 120">
            <circle class="countdown-bg" cx="60" cy="60" r="52"></circle>
            <circle class="countdown-progress" id="countdownProgress" cx="60" cy="60" r="52"></circle>
          </svg>
          <div class="countdown-time" id="countdownTimer">01:00</div>
        </div>

        <div class="countdown-subtext">
          If noise continues, staff will be notified.
        </div>
      </div>
    </div>
  </div>

  <script>
    let audioContext;
    let analyser;
    let microphone;
    let dataArray;
    let isMonitoring = false;
    let redLockActive = false;
    let redLockEndsAt = null;
    let latestDetectedState = "green";

    const socket = io(); // Connect to the Python Flask-SocketIO server. Address can be put in parentheses for stuff if needed.

    let lastPing = Date.now(); // New pinger to the dashboard, allowing for real time status checks for those on the dashboard.
    const ping_Interval_MS = 2500; // The interval of time between room page data being sent to dashboard.

    let GREEN_MAX_THRESHOLD = 20; // Added new default variables for these noise thresholds.
    let YELLOW_MAX_THRESHOLD = 50;

    let RED_TIME = 1 * 60 * 1000; // Amount of time is measured in miliseconds for this timer, so change left most number to change amount of minutes.

    let countdownSamples = []; // An array that will be used to help with the cooldown period's noise tracking.

    let MIC_SENSITIVITY = 1.0; // Default/embedded mic sensitivity.
    let ACTIVE_NOISE_CANCELLATION = true; // Default/embedded noise cancellation option.
    let currentStream = null; // Used to track microphone data stream so it can be restarted if settings change.

    const recentLevels = [];
    const WINDOW_SIZE = 10;

    const YELLOW_HOLD_MS = 3000;
    const RED_HOLD_MS = 3500;

    let currentState = "green";
    let stateEnteredAt = Date.now();
    
    const radius = 52;
    const circumference = 2 * Math.PI * radius;

    let countdownStart = null;
    let countdownFinished = false;

    const statusText = document.getElementById("statusText");
    const thankYouText = document.getElementById("thankYouText");
    const soundLevelText = document.getElementById("soundLevel");
    const messageText = document.getElementById("messageText");
    const startButton = document.getElementById("startButton");

    const reportCard = document.getElementById("reportCard");
    const countdownCard = document.getElementById("countdownCard");
    const countdownProgress = document.getElementById("countdownProgress");
    const countdownTimer = document.getElementById("countdownTimer");

    countdownProgress.style.strokeDasharray = `${circumference}`;
    countdownProgress.style.strokeDashoffset = "0";

    function getRoomFromURL(){ // Gets room number from url, made with Google Gemini's help.
      const params = new URLSearchParams(window.location.search);
      return params.get("room") || "311"; // Use params from url to get specific room number.
    }

    const currentRoomNumber = getRoomFromURL();
    document.getElementById("roomLabel").textContent = `Study Room ${currentRoomNumber}`; // Now room number label should be the proper room's number, not just 311.
    console.log("DEBUG: The current room is:", currentRoomNumber); // WILL REMOVE THIS LATER. JUST FOR TESTING!
    // Enter http://localhost:5000/dashboard?room=xyz in url to see different rooom numbers, where xyz is some number.

    function formatTime(ms) {
      const total = Math.max(0, Math.ceil(ms / 1000));
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function updateCircle(remaining) {
      const clamped = Math.max(0, remaining);
      const percent = clamped / RED_TIME;
      const offset = circumference * (1 - percent);

      countdownProgress.style.strokeDashoffset = offset;
      countdownTimer.textContent = formatTime(clamped);
    }

    function startCountdown() {
  if (countdownStart !== null) return;

  countdownSamples = []; // Empty the array as countdown starts anew.

  countdownStart = Date.now();
  countdownFinished = false;

  redLockActive = true;
  redLockEndsAt = countdownStart + RED_TIME;

  reportCard.classList.add("hidden");
  countdownCard.classList.remove("hidden");
  updateCircle(RED_TIME);
}

    function resetCountdown() {
  countdownStart = null;
  countdownFinished = false;

  redLockActive = false;
  redLockEndsAt = null;

  reportCard.classList.remove("hidden");
  countdownCard.classList.add("hidden");
  updateCircle(RED_TIME);
}

    async function startMonitoring() {
      if (isMonitoring) return;

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio:{ // Adjusted to add the noise suppression and echo cancelling features for the mic. Now bound to whether the noise cancellation is active or not through the dashboard.
            noiseSuppression: ACTIVE_NOISE_CANCELLATION,
            echoCancellation: ACTIVE_NOISE_CANCELLATION
          }
        });

        currentStream = stream // Save mic's current stream.

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;

        microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);

        dataArray = new Uint8Array(analyser.fftSize);

        isMonitoring = true;
        startButton.textContent = "Microphone Active";
        startButton.disabled = true;
        startButton.style.opacity = "0.82";
        startButton.style.cursor = "default";

        updateSoundLevel();
      } catch (error) {
        console.error("Microphone access error:", error);
        alert("Could not access microphone: " + error.name + " - " + error.message);
      }
    }

    async function restartMicrophoneStream(){ // New function that resets the mic hardware to allow for noise suppression to be applied more easily.
      if (currentStream){
        currentStream.getTracks().forEach(track => track.stop()); // Stop the mic from detecting audio...
        isMonitoring = false;
        await startMonitoring() //...Then start the mic again, this time with the new noise suppression settings applied.
      }
    }

    function updateSoundLevel() {
      if (!analyser) return;

      analyser.getByteTimeDomainData(dataArray);

      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) {
        const normalized = (dataArray[i] - 128) / 128;
        sum += normalized * normalized;
      }

      const rms = Math.sqrt(sum / dataArray.length);
      const rawLevel = rms * 500 * MIC_SENSITIVITY; // Edited to allow for mic sensitivity to change the actual settings on a room page. Value is sent from dashboard.

      recentLevels.push(rawLevel);
      if (recentLevels.length > WINDOW_SIZE) {
        recentLevels.shift();
      }

      const averageLevel =
        recentLevels.reduce((total, value) => total + value, 0) / recentLevels.length;

      const level = Math.round(averageLevel);
      soundLevelText.textContent = "Current Sound Level: " + level;

      let targetState;
if (level < GREEN_MAX_THRESHOLD) { // Changed from 20 to a variable that is able to be edited by staff through dashboard.
  targetState = "green";
} else if (level < YELLOW_MAX_THRESHOLD) { // Change from 50 to a variable like above.
  targetState = "yellow";
} else {
  targetState = "red";
}

latestDetectedState = targetState;
const now = Date.now(); // Moved this from below the following if to above to fix a reference error.

if (now - lastPing >= ping_Interval_MS){ // Simple loop that happens every so often to send status updates to dashboard.
  socket.emit('room_ping',{ // Sends the room number, noise level and status.
    room: currentRoomNumber,
    level: level,
    status: targetState.toUpperCase()
  });
  lastPing = now; // Now repeat for next time...

  if (redLockActive){
    countdownSamples.push(level);
  }
}

      
const timeInCurrentState = now - stateEnteredAt;

if (redLockActive) {
  const remaining = redLockEndsAt - now;
  updateCircle(remaining);

  if (remaining <= 0 && !countdownFinished) {
    countdownFinished = true;

    let totalVolumeAccumulated = 0; // Total of colume from samples during red cooldown.
    for (let i = 0; i < countdownSamples.length; i++){
      totalVolumeAccumulated += countdownSamples[i];
    }

    // Check just in case array is empty. (AVOIDS DIVIDING BY 0!)
    const averageCountdownVolume = countdownSamples.length > 0 ? (totalVolumeAccumulated / countdownSamples.length) : 0;

    if (averageCountdownVolume >= YELLOW_MAX_THRESHOLD){ // If average noise over the cooldown period was greater than the yellow threshold...
      socket.emit('noise_alert', { //...red state is maintained, so send a noise alert.
        room: currentRoomNumber,
        status: "SUSTAINED LOUDNESS"
      });
    }

    redLockActive = false;
    countdownStart = null;
    redLockEndsAt = null;

    countdownCard.classList.add("hidden");
    reportCard.classList.remove("hidden");

    setState(latestDetectedState);
  }
} else {
  if (isMoreSevere(targetState, currentState)) {
    setState(targetState);
  } else if (targetState !== currentState) {
    const requiredHold =
      currentState === "red"
        ? RED_HOLD_MS
        : currentState === "yellow"
        ? YELLOW_HOLD_MS
        : 0;

    if (timeInCurrentState >= requiredHold) {
      setState(targetState);
    }
  }
}


      requestAnimationFrame(updateSoundLevel);
    }

    function isMoreSevere(newState, oldState) {
      const severity = {
        green: 0,
        yellow: 1,
        red: 2
      };
      return severity[newState] > severity[oldState];
    }

    function setState(state) {
      currentState = state;
      stateEnteredAt = Date.now();

      if (state === "green") {
        resetCountdown();

        document.body.style.backgroundColor = "#7ed957";
        document.body.style.color = "#111";

        statusText.textContent = "QUIET";
        thankYouText.textContent = "Thank you for keeping this space quiet!";
        messageText.textContent = "Noise level is acceptable.";
      } else if (state === "yellow") {
        resetCountdown();

        document.body.style.backgroundColor = "#ffd966";
        document.body.style.color = "#111";

        statusText.textContent = "WARNING";
        thankYouText.textContent = "Please lower your volume to maintain a quiet study space.";
        messageText.textContent = "Noise level is rising.";
      } else {
        startCountdown();

        document.body.style.backgroundColor = "#ff6b6b";
        document.body.style.color = "#111";

        statusText.textContent = "TOO LOUD";
        thankYouText.textContent = "This room is too loud. Please be mindful of others.";
        messageText.textContent = "Noise level is too high.";
      }
    }

    socket.on('apply_new_settings', (data) =>{ // Page will now listen for setting updates from the staff dashboard page.
      if (data.room === currentRoomNumber){ // MAKE SURE THE ROOM THE STAFF ARE LOOKING TO UPDATE IS THE EXACT SAME AS THE ROOM NUMBER OF A NOISE LEVEL PAGE!
        GREEN_MAX_THRESHOLD = data.greenMax; // Apply changes and notfify through console.
        YELLOW_MAX_THRESHOLD = data.yellowMax;

        if (data.countdownMins){ // If cooldown timer is sent, update it as well.
          RED_TIME = data.countdownMins * 60 * 1000;
          console.log('Red cooldown timer has been adjusted! Cooldown: ${data.countdownMins}');
        }

        MIC_SENSITIVITY = data.micSensitivity || 1.0; // Update mic sensitivity or default it to 1.

        if (data.noiseCancellation !== undefined && data.noiseCancellation !== ACTIVE_NOISE_CANCELLATION){
          ACTIVE_NOISE_CANCELLATION = data.noiseCancellation;
          restartMicrophoneStream();
          console.log(`🎯 Mic settings updated! Boost: ${MIC_SENSITIVITY}x, Noise Cancel: ${ACTIVE_NOISE_CANCELLATION}`);
        }

        console.log('Thresholds have been adjusted! Green Max: ${data.greenMax}, Yellow Max: ${data.yellowMax}');
      }
    })
  </script>
</body>
</html>
